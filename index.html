  ctx.save(); ctx.shadowBlur = 55; ctx.shadowColor = '#FFD700';
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 100px Arial'; ctx.textAlign = 'center';
  ctx.fillText('CHAMPION!', W/2, H/2 - 55);
  ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = '34px Arial'; ctx.textAlign = 'center';
  ctx.fillText(`Final Score: ${score}`, W/2, H/2 + 14);
  ctx.fillText('You completed all 3 levels!', W/2, H/2 + 62);
  const pulse = Math.sin(t/24)*0.35 + 0.65;
  ctx.save(); ctx.globalAlpha = pulse;
  ctx.fillStyle = '#74AADB'; ctx.font = 'bold 28px Arial';
  ctx.fillText('Press SPACE or ENTER to play again', W/2, H/2 + 130);
  ctx.restore();
}

// ─── Mate Power-Up Collectibles ────────────────────────────────────────────────
const collectibles = [];
function spawnCollectibles(platList) {
  collectibles.length = 0;
  let cnt = 0;
  for (let i = 1; i < platList.length; i++) {
    const p = platList[i];
    if (p.h > 50) continue; // skip ground
    if (cnt % 4 === 0) {
      collectibles.push({ x: p.x + p.w/2 - 10, y: p.y - 26, w: 20, h: 26,
        collected: false, bob: Math.random() * Math.PI * 2 });
    }
    cnt++;
  }
}
function updateCollectibles() {
  for (const c of collectibles) {
    if (c.collected || !player || player.dead) continue;
    if (player.x + player.w > c.x && player.x < c.x + c.w &&
        player.y + player.h > c.y && player.y < c.y + c.h) {
      c.collected = true;
      player.invincible = Math.max(player.invincible, 200);
      score += 50;
      mateCount++;
      sfxMate();
      if (mateCount % 5 === 0) {
        player.lives++;
        addText(c.x + c.w/2, c.y - 10, '🧉 ¡MATE! +50  +1 LIFE! 🧉', '#78D430');
      } else {
        addText(c.x + c.w/2, c.y - 10, '🧉 ¡MATE! +50', '#78D430');
      }
      spawnParticles(c.x + c.w/2, c.y, 18, ['#78D430','#AADDAA','#FFD700','#fff']);
    }
  }
}
function drawCollectibles(camX, t) {
  for (const c of collectibles) {
    if (c.collected) continue;
    const sx = c.x - camX;
    if (sx < -40 || sx > W + 40) continue;
    const bob = Math.sin(t/28 + c.bob) * 3;
    ctx.save();
    // Glow
    ctx.globalAlpha = 0.32 + Math.sin(t/22 + c.bob) * 0.1;
    ctx.fillStyle = '#78D430';
    ctx.beginPath(); ctx.arc(sx + c.w/2, c.y + c.h/2 + bob, 18, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // Gourd body
    ctx.fillStyle = '#3A7020';
    ctx.beginPath(); ctx.ellipse(sx + c.w/2, c.y + c.h*0.65 + bob, c.w*0.42, c.h*0.36, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4A9030';
    ctx.beginPath(); ctx.ellipse(sx + c.w/2 - 2, c.y + c.h*0.57 + bob, c.w*0.27, c.h*0.22, 0, 0, Math.PI*2); ctx.fill();
    // Neck
    ctx.fillStyle = '#2A5018'; ctx.fillRect(sx + c.w/2 - 3, c.y + c.h*0.22 + bob, 6, c.h*0.25);
    // Bombilla (straw)
    ctx.strokeStyle = '#C0A030'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(sx + c.w/2 + 2, c.y + c.h*0.10 + bob); ctx.lineTo(sx + c.w/2 + 9, c.y + c.h*0.65 + bob); ctx.stroke();
    // Steam puff
    if (Math.sin(t/14 + c.bob) > 0.2) {
      ctx.globalAlpha = 0.38; ctx.fillStyle = '#AADDAA';
      ctx.beginPath(); ctx.arc(sx + c.w/2 + 4, c.y + bob - 5, 3.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

// ─── Game State ───────────────────────────────────────────────────────────────
// states: 'title' | 'levelcard' | 'playing' | 'gameover' | 'victory'
let state = 'title';
let score = 0;
let levelIdx = 0;
let platforms = [];
let enemies   = [];
let boss      = null;
let goal      = null;
let player    = null;
let ball      = null;
let cat       = null;
let goalScored = false;
let mateCount = 0;
let levelTransitioning = false;
const cam = { x: 0 };
let frameCount = 0;
let cardTimer = 0;

function getGroundY(plats) {
  const g = plats.find(p => p.h > 50);
  return g ? g.y : 640;
}

function loadLevel(idx) {
  const lvl = LEVELS[idx];
  platforms  = lvl.platforms;
  enemies    = lvl.enemies.map(d => new Enemy(d, platforms));
  boss       = enemies.find(e => e.type === 'boss' || e.type === 'stun-boss') || null;
  goal       = new SoccerGoal(lvl.goalX, getGroundY(platforms));
  goalScored = false;
  levelTransitioning = false;
  particles.length  = 0;
  floatTexts.length = 0;
  spawnCollectibles(platforms);

  const sp = player;
  if (!sp) {
    player = new Player(lvl.spawnX, lvl.spawnY);
  } else {
    sp.spawnX = lvl.spawnX; sp.spawnY = lvl.spawnY;
    sp.x = lvl.spawnX; sp.y = lvl.spawnY;
    sp.vx = 0; sp.vy = 0;
    sp.dead = false; sp.deadTimer = 0;
    sp.invincible = 80;
    sp.hasBall = true;
  }
  ball = new Ball();
  cam.x = 0;
  // Cat is created after player is set up below
}

function _initCat() {
  cat = new Cat(player);
}

function startGame() {
  score     = 0;
  levelIdx  = 0;
  mateCount = 0;
  player   = null;
  loadLevel(0);
  player.lives = 3;
  _initCat();
}

// ─── Main Loop ────────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  frameCount++;

  const lvl = LEVELS[Math.min(levelIdx, LEVELS.length - 1)];

  // ── Title ─────────────────────────────────────────────────────────────────
  if (state === 'title') {
    cam.x = Math.sin(frameCount / 220) * 150 + 400;
    drawBg(cam.x, frameCount, 'caminito');
    drawPlatforms(cam.x, LEVELS[0].platforms);
    drawTitle(frameCount);
    if (keys['Space'] || keys['Enter']) {
      startGame();
      state = 'levelcard';
      cardTimer = 0;
    }
    return;
  }

  // ── Level card ────────────────────────────────────────────────────────────
  if (state === 'levelcard') {
    cam.x = 0;
    drawBg(cam.x, frameCount, lvl.bgTheme);
    drawPlatforms(cam.x, platforms);
    drawLevelCard(levelIdx, frameCount);
    cardTimer++;
    if ((keys['Space'] || keys['Enter']) && cardTimer > 25) state = 'playing';
    return;
  }

  // ── Game Over ─────────────────────────────────────────────────────────────
  if (state === 'gameover') {
    drawBg(cam.x, frameCount, lvl.bgTheme);
    drawPlatforms(cam.x, platforms);
    updateParticles(); drawParticles(cam.x);
    updateTexts();     drawTexts(cam.x);
    drawGameOver(score, frameCount);
    if (keys['Space'] || keys['Enter']) state = 'title';
    return;
  }

  // ── Victory ───────────────────────────────────────────────────────────────
  if (state === 'victory') {
    drawBg(cam.x, frameCount, 'obelisco');
    updateParticles(); drawParticles(cam.x);
    updateTexts();     drawTexts(cam.x);
    drawVictory(score, frameCount);
    if (keys['Space'] || keys['Enter']) state = 'title';
    return;
  }

  // ── Playing ───────────────────────────────────────────────────────────────
  // Update player
  player.update(ball, platforms);
  if (keys['KeyZ'] && cat) cat.launch(player);

  // Slide tackle hits enemies
  if (player.sliding && !player.dead) {
    for (const e of enemies) {
      if (!e.alive) continue;
      const slideTop = player.y + player.h * 0.52;
      if (player.x + player.w > e.x + 4 && player.x < e.x + e.w - 4 &&
          slideTop < e.y + e.h && player.y + player.h > e.y) {
        const dead = e.hit();
        player.sliding = false; player.slideTimer = 0;
        player.vx = player.facing ? -4 : 4;
        spawnParticles(player.x + player.w/2, player.y + player.h * 0.7, 22,
          ['#FFD700','#fff','#74AADB','#FF8800']);
        if (dead) {
          score += (e.type === 'boss' || e.type === 'stun-boss' || e.type === 'keeper-boss') ? 500 : 100;
          addText(e.x + e.w/2, e.y - 22, 'SLIDE TACKLE! +100', '#FFD700');
        } else {
          addText(e.x + e.w/2, e.y - 22, 'SLIDE! Use cat/ball!', '#FFD700');
        }
        break;
      }
    }
  }

  // Player–enemy contact → die (skip when sliding)
  if (!player.dead && player.invincible <= 0 && !player.sliding) {
    for (const e of enemies) {
      if (!e.alive) continue;
      if (player.x + player.w - 6 > e.x &&
          player.x + 6 < e.x + e.w &&
          player.y + player.h - 4 > e.y &&
          player.y + 4 < e.y + e.h) {
        player.die();
        break;
      }
    }
  }

  // Game over check
  if (player.lives <= 0 && player.dead && player.deadTimer <= 0) {
    state = 'gameover';
    return;
  }

  // Ball
  const pts = ball.update(player, enemies, platforms);
  if (pts) score += pts;

  // Cat
  const catPts = cat ? cat.update(player, enemies, platforms) : 0;
  if (catPts) score += catPts;

  // Enemies
  for (const e of enemies) e.update();

  // Collectibles
  updateCollectibles();

  // Goal check (only after boss is dead)
  if (!goalScored && !levelTransitioning && boss && !boss.alive) {
    if (goal.checkBall(ball)) {
      goalScored = true;
      ball.active = false;
      score += 300;
      sfxNetGoal(); doShake(15);
      // Argentine flag confetti: celeste y blanco
      spawnParticles(goal.x + goal.w/2, goal.y + goal.h/2, 140,
        ['#74AADB','#FFFFFF','#74AADB','#FFFFFF','#FFD700','#74AADB','#fff','#5A9ADB']);
      addText(goal.x + goal.w/2, goal.y - 65, '¡GOLAZO!', '#FFD700');
      addText(goal.x + goal.w/2, goal.y - 35, '⚽ +300', '#FFFFFF');
      levelTransitioning = true;
      setTimeout(() => {
        levelIdx++;
        if (levelIdx >= LEVELS.length) {
          state = 'victory';
          sfxWin();
        } else {
          loadLevel(levelIdx);
          _initCat();
          state = 'levelcard';
          cardTimer = 0;
        }
      }, 2500);
    }
  }

  updateParticles();
  updateTexts();

  // Camera
  const target = player.x - W/2 + player.w/2;
  cam.x += (target - cam.x) * 0.085;
  cam.x  = Math.max(0, cam.x);

  // Rain (Obelisco + Bombonera)
  if (lvl.bgTheme === 'obelisco' || lvl.rain) updateRain();

  // Slippery ground in rain (Obelisco)
  if (lvl.bgTheme === 'obelisco' && player.onGround && !player.sliding) {
    player.vx *= 1.045; // slight momentum carry = feels slippery
  }

  // Draw
  drawBg(cam.x, frameCount, lvl.bgTheme);
  ctx.save();
  if (shakeX > 0 || shakeY > 0) {
    ctx.translate((Math.random()*2-1)*shakeX, (Math.random()*2-1)*shakeY);
    shakeX = Math.max(0, shakeX - 0.85); shakeY = Math.max(0, shakeY - 0.85);
  }
  drawPlatforms(cam.x, platforms);
  drawCollectibles(cam.x, frameCount);
  if (goal) goal.draw(cam.x, boss && boss.alive);
  if (lvl.bgTheme === 'obelisco' || lvl.rain) drawRain();
  for (const e of enemies) e.draw(cam.x);
  if (cat) cat.draw(cam.x);
  ball.draw(cam.x);
  player.draw(cam.x);
  drawParticles(cam.x);
  drawTexts(cam.x);
  ctx.restore();
  drawHUD(score, player, ball, cat, levelIdx, boss, goalScored);
}

loop();
</script>
