// ─── Audio ────────────────────────────────────────────────────────────────────
let audioCtx;
function audio() { return audioCtx || (audioCtx = new AudioContext()); }
function tone(freq, dur, type = 'sine', vol = 0.25) {
  try {
    const ac = audio(), osc = ac.createOscillator(), g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.value = freq; osc.type = type;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start(); osc.stop(ac.currentTime + dur);
  } catch(_) {}
}
function sfxKick()  { tone(180, 0.08, 'sawtooth', 0.3); setTimeout(() => tone(300, 0.06, 'square', 0.15), 60); }
function sfxJump()  {
  try {
    const ac = audio(), osc = ac.createOscillator(), g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.setValueAtTime(280, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(560, ac.currentTime + 0.18);
    g.gain.setValueAtTime(0.18, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
    osc.start(); osc.stop(ac.currentTime + 0.18);
  } catch(_) {}
}

// ─── Particles ────────────────────────────────────────────────────────────────
const particles = [];
function spawnParticles(x, y, n, colors) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 7;
    particles.push({
      x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 2,
      life: 1, decay: 0.013 + Math.random() * 0.018,
      r: 3 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.vx *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles(camX) {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x - camX, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── Floating Text ────────────────────────────────────────────────────────────
const floatTexts = [];
function addText(x, y, txt, col) {
  floatTexts.push({ x, y, txt, col, life: 1, vy: -1.8 });
}
function updateTexts() {
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const t = floatTexts[i];
    t.y += t.vy; t.life -= 0.018;
    if (t.life <= 0) floatTexts.splice(i, 1);
  }
}
function drawTexts(camX) {
  for (const t of floatTexts) {
    ctx.save();
    ctx.globalAlpha = t.life;
    ctx.font = 'bold 30px Arial';
    ctx.textAlign = 'center';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 5;
    ctx.strokeText(t.txt, t.x - camX, t.y);
    ctx.fillStyle = t.col;
    ctx.fillText(t.txt, t.x - camX, t.y);
    ctx.restore();
  }
}

// ─── Rounded Rect Helper ──────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

class Enemy {
  constructor(data, platformList) {
    this.x = data.x; this.startX = data.x; this.y = data.y;
    this.type = data.type || 'grunt';
    this.patrol = data.patrol || 80;
    this.platforms = platformList;
    this.alive = true;
    this.facing = true;
    this.frame = 0; this.fTimer = 0;
    this.vy = 0; this.onGround = false;
    this.hitFlash = 0;

    if (this.type === 'boss') {
      this.w = 70; this.h = 84;
      this.maxHp = data.hp || 6; this.hp = this.maxHp;
      this.speed = 1.6;
      this.raging = false;
      this.shotTimer = 240 + Math.floor(Math.random() * 80);
      this.projectiles = [];
    } else if (this.type === 'stun-boss') {
      this.w = 72; this.h = 88;
      this.maxHp = data.hp || 7; this.hp = this.maxHp;
      this.speed = 1.7;
      this.confused = false;
      this.confuseTimer = 0;
      this.starAngle = 0;
      this.raging = false;
      this.shotTimer = 280 + Math.floor(Math.random() * 80);
      this.projectiles = [];
    } else if (this.type === 'keeper-boss') {
      this.w = 84; this.h = 96;
      this.maxHp = data.hp || 4; this.hp = this.maxHp;
      this.speed = 3.2;
      this.raging = false;
      this.goalHalfW = 120; // half-width of goal opening beyond keeper body
      this.diveDir = 0; this.diveTimer = 0;
      this.projectiles = [];
    } else if (this.type === 'speeder') {
      this.w = 36; this.h = 48;
      this.speed = 3.0;
    } else if (this.type === 'jumper') {
      this.w = 38; this.h = 52;
      this.speed = 1.3;
      this.jumpTimer = 50 + Math.floor(Math.random() * 60);
    } else { // grunt
      this.w = 42; this.h = 55;
      this.speed = 1.4;
    }
    this.vx = this.speed;
  }

  update() {
    if (!this.alive) return;
    // stun-boss: freeze and count down confusion
    if (this.type === 'stun-boss' && this.confused) {
      this.confuseTimer--;
      this.starAngle += 0.055;
      if (this.confuseTimer <= 0) {
        this.confused = false;
        addText(this.x + this.w/2, this.y - 20, 'RECOVERED! Use cat again!', '#FF8800');
      }
    } else {
      this.x += this.vx;
      if (this.x > this.startX + this.patrol) { this.vx = -this.speed; this.facing = false; }
      if (this.x < this.startX - this.patrol) { this.vx =  this.speed; this.facing = true;  }
    }
    this.vy += GRAVITY;
    this.y += this.vy;
    this.onGround = false;
    for (const p of this.platforms) {
      if (this.x + this.w > p.x && this.x < p.x + p.w &&
          this.y + this.h > p.y && this.y + this.h < p.y + p.h + 16 && this.vy >= 0) {
        this.y = p.y - this.h; this.vy = 0; this.onGround = true;
      }
    }
    if (this.type === 'jumper' && this.onGround) {
      this.jumpTimer--;
      if (this.jumpTimer <= 0) {
        this.vy = -11.5;
        this.jumpTimer = 45 + Math.floor(Math.random() * 55);
      }
    }
    if (this.hitFlash > 0) this.hitFlash--;
    if (this.onGround) {
      this.fTimer++;
      if (this.fTimer >= 8) { this.frame = (this.frame + 1) % 4; this.fTimer = 0; }
    }
    // ── Boss rage mode ─────────────────────────────────────────────────────
    if ((this.type === 'boss' || this.type === 'stun-boss' || this.type === 'keeper-boss') && !this.raging && this.hp > 0) {
      if (this.hp <= Math.ceil(this.maxHp / 2)) {
        this.raging = true;
        this.speed *= (this.type === 'keeper-boss' ? 1.7 : 1.85);
        this.patrol *= 1.4;
        addText(this.x + this.w/2, this.y - 42, '💀 ¡ENRAGED!', '#FF2200');
        doShake(12);
        sfxRage();
      }
    }
    // ── Boss projectile attack ─────────────────────────────────────────────
    if (this.projectiles !== undefined) {
      const canShoot = this.type === 'boss' || (this.type === 'stun-boss' && !this.confused);
      if (canShoot) {
        this.shotTimer--;
        if (this.shotTimer <= 0 && player && !player.dead) {
          const pdx = (player.x + player.w/2) - (this.x + this.w/2);
          const pdy = (player.y + player.h/2) - (this.y + this.h/2);
          const pdist = Math.hypot(pdx, pdy) || 1;
          const spd = this.raging ? 7.5 : 5.5;
          this.projectiles.push({
            x: this.x + this.w/2, y: this.y + this.h * 0.28,
            vx: pdx/pdist * spd, vy: pdy/pdist * spd - 1.5,
            life: 170, r: 9
          });
          sfxHit();
          this.shotTimer = this.raging ? 130 : 170;
        }
      }
      for (let i = this.projectiles.length - 1; i >= 0; i--) {
        const p = this.projectiles[i];
        p.x += p.vx; p.y += p.vy; p.vy += GRAVITY * 0.11; p.life--;
        if (p.life <= 0) { this.projectiles.splice(i, 1); continue; }
        if (player && !player.dead && player.invincible <= 0) {
          if (Math.hypot((player.x + player.w/2) - p.x, (player.y + player.h/2) - p.y) < p.r + 20) {
            player.die(); doShake(9); this.projectiles.splice(i, 1);
          }
        }
      }
    }
  }

  stun() {
    this.confused = true;
    this.confuseTimer = 210;
    this.starAngle = 0;
    this.hitFlash = 0;
  }

  // Called when ball slips past the keeper into the goal — actual damage
  goalHit() {
    this.hp--;
    this.hitFlash = 20;
    sfxHit(); doShake(9);
    spawnParticles(this.x + this.w/2, this.y + this.h/2, 32,
      ['#FFD700','#74AADB','#FFFFFF','#FFD700','#AAEEAA']);
    if (this.hp <= 0) { this.die(); return true; }
    addText(this.x + this.w/2, this.y - 16, `⚽ GOAL! ${this.hp} more!`, '#FFD700');
    return false;
  }

  // Returns true if enemy is now dead
  hit() {
    if (this.type === 'keeper-boss') {
      // Direct body hit = SAVED — deflect ball, no damage
      sfxHit();
      this.hitFlash = 10;
      spawnParticles(this.x + this.w/2, this.y + this.h/2, 12, ['#FF8800','#FFD700','#fff']);
      addText(this.x + this.w/2, this.y - 22, '🧤 SAVED! Aim for the corners!', '#FF8800');
      return false;
    }
    if (this.type === 'stun-boss') {
      if (!this.confused) {
        sfxHit();
        addText(this.x + this.w/2, this.y - 22, 'Send the cat first!  (Z)', '#88CCFF');
        spawnParticles(this.x + this.w/2, this.y, 8, ['#88CCFF','#fff']);
        return false;
      }
      this.hp--;
      this.hitFlash = 15;
      sfxHit();
      spawnParticles(this.x + this.w/2, this.y + this.h/2, 22,
        ['#88CCFF','#FFD700','#fff','#8090A0']);
      if (this.hp <= 0) { this.die(); return true; }
      addText(this.x + this.w/2, this.y - 14, `BONK! ${this.hp} left`, '#88CCFF');
      return false;
    }
    if (this.type === 'boss') {
      this.hp--;
      this.hitFlash = 20;
      sfxHit(); doShake(7);
      spawnParticles(this.x + this.w/2, this.y + this.h/2, 18,
        ['#FF8800','#FFD700','#fff','#FF4400']);
      if (this.hp <= 0) {
        this.die(); return true;
      }
      addText(this.x + this.w/2, this.y - 14, `HIT! ${this.hp} HP left`, '#FF8800');
      return false;
    } else {
      this.die(); return true;
    }
  }

  die() {
    this.alive = false;
    spawnParticles(this.x + this.w/2, this.y + this.h/2, 36,
      ['#FF4444','#FF8800','#FFEE00','#fff','#FF6688','#FF99AA']);
    const isBoss = this.type === 'boss' || this.type === 'stun-boss' || this.type === 'keeper-boss';
    const msg = isBoss ? 'BOSS DOWN! +500' : '+100';
    addText(this.x + this.w/2, this.y - 12, msg, '#FFD700');
    if (isBoss) sfxWin(); else sfxGoal();
  }

  draw(camX) {
    if (!this.alive) return;
    const sx = this.x - camX;
    if (sx < -120 || sx > W + 120) return;

    // Keeper-boss: draw goal posts in screen space before any transform
    if (this.type === 'keeper-boss') {
      const gL = this.startX - this.goalHalfW - camX;
      const gR = this.startX + this.w + this.goalHalfW - camX;
      const gTop = this.y - 24;
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.20)'; ctx.lineWidth = 1;
      for (let nx = gL; nx <= gR + 12; nx += 22) {
        ctx.beginPath(); ctx.moveTo(nx, gTop); ctx.lineTo(nx, this.y + this.h); ctx.stroke();
      }
      for (let ny = gTop; ny <= this.y + this.h; ny += 22) {
        ctx.beginPath(); ctx.moveTo(gL, ny); ctx.lineTo(gR + 12, ny); ctx.stroke();
      }
      ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
      ctx.fillStyle = '#EEE';
      ctx.fillRect(gL, gTop, 12, this.h + 24);       // left post
      ctx.fillRect(gR, gTop, 12, this.h + 24);       // right post
      ctx.fillRect(gL, gTop, gR - gL + 12, 12);      // crossbar
      ctx.restore();
    }

    ctx.save();
    if (this.hitFlash > 0 && this.hitFlash % 4 < 2) ctx.globalAlpha = 0.4;
    ctx.translate(sx + (this.facing ? 0 : this.w), this.y);
    ctx.scale(this.facing ? 1 : -1, 1);
    if      (this.type === 'boss')         this._drawBoss();
    else if (this.type === 'stun-boss')   this._drawStunBoss();
    else if (this.type === 'keeper-boss') this._drawKeeper();
    else if (this.type === 'speeder')     this._drawSpeeder();
    else if (this.type === 'jumper')      this._drawJumper();
    else                                  this._drawGrunt();
    ctx.restore();
    // Boss projectiles
    if (this.projectiles && this.projectiles.length) {
      for (const p of this.projectiles) {
        const psx = p.x - camX;
        if (psx < -30 || psx > W + 30) continue;
        ctx.save();
        ctx.globalAlpha = Math.min(1, p.life / 40);
        const pcol = this.type === 'stun-boss' ? '#CC44FF' : '#FF5500';
        const pglow = ctx.createRadialGradient(psx, p.y, 0, psx, p.y, p.r * 2.8);
        pglow.addColorStop(0, pcol); pglow.addColorStop(1, 'transparent');
        ctx.fillStyle = pglow; ctx.beginPath(); ctx.arc(psx, p.y, p.r * 2.8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = this.type === 'stun-boss' ? '#EE88FF' : '#FF9944';
        ctx.beginPath(); ctx.arc(psx, p.y, p.r, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }
    // Boss / stun-boss / keeper-boss HP bar
    if (this.type === 'boss' || this.type === 'stun-boss' || this.type === 'keeper-boss') {
      const bx = sx, by = this.y - 22;
      ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(bx, by, this.w, 12);
      const barCol = this.type === 'stun-boss'
        ? (this.confused ? '#44CCFF' : '#AA66FF')
        : this.type === 'keeper-boss' ? '#44DD88'
        : (this.hp > this.maxHp / 2 ? '#44FF44' : '#FF4444');
      ctx.fillStyle = barCol;
      ctx.fillRect(bx, by, this.w * (this.hp / this.maxHp), 12);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
      ctx.strokeRect(bx, by, this.w, 12);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center';
      const label = this.type === 'stun-boss' ? (this.confused ? '😵 STUNNED!' : 'BOSS')
        : this.type === 'keeper-boss' ? `🧤 ${this.hp}/${this.maxHp} saves`
        : 'BOSS';
      ctx.fillText(label, bx + this.w/2, by - 3);
      // confusion stars orbiting head
      if (this.type === 'stun-boss' && this.confused) {
        for (let i = 0; i < 5; i++) {
          const a = this.starAngle + (i / 5) * Math.PI * 2;
          const rx = sx + this.w/2 + Math.cos(a) * 34;
          const ry = this.y + 10 + Math.sin(a) * 16;
          ctx.font = '16px serif'; ctx.textAlign = 'center';
          ctx.fillText('⭐', rx, ry);
        }
      }
    }
  }

  _drawGrunt() {
    const w = this.w, h = this.h, cx = w / 2;
    const sw = Math.sin(this.frame * Math.PI / 2) * 0.38;
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(cx, h+3, 18, 5, 0, 0, Math.PI*2); ctx.fill();
    // legs
    ctx.save(); ctx.translate(cx-8, h-24); ctx.rotate(sw);
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-6, 0, 12, 11);
    ctx.fillStyle = '#E5B97A'; ctx.fillRect(-5, 11, 10, 13);
    ctx.fillStyle = '#B22222'; ctx.fillRect(-7, 23, 14, 7); ctx.restore();
    ctx.save(); ctx.translate(cx+8, h-24); ctx.rotate(-sw);
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-6, 0, 12, 11);
    ctx.fillStyle = '#E5B97A'; ctx.fillRect(-5, 11, 10, 13);
    ctx.fillStyle = '#B22222'; ctx.fillRect(-5, 23, 14, 7); ctx.restore();
    // body
    const bg = ctx.createLinearGradient(0, 18, 0, h-20);
    bg.addColorStop(0, '#CC1111'); bg.addColorStop(1, '#880000');
    ctx.fillStyle = bg; ctx.fillRect(4, 18, w-8, h-38);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 8px Arial'; ctx.textAlign = 'center';
    ctx.fillText('5', cx, h-26);
    // arms
    ctx.save(); ctx.translate(4, 24); ctx.rotate(-sw*0.5);
    ctx.fillStyle = '#CC1111'; ctx.fillRect(-9, 0, 10, 15);
    ctx.fillStyle = '#E5B97A'; ctx.fillRect(-8, 14, 9, 10); ctx.restore();
    ctx.save(); ctx.translate(w-4, 24); ctx.rotate(sw*0.5);
    ctx.fillStyle = '#CC1111'; ctx.fillRect(0, 0, 9, 15);
    ctx.fillStyle = '#E5B97A'; ctx.fillRect(0, 14, 8, 10); ctx.restore();
    // head
    ctx.fillStyle = '#E5B97A';
    ctx.beginPath(); ctx.arc(cx, 12, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3A2010';
    ctx.beginPath(); ctx.arc(cx, 6, 14, Math.PI*0.88, Math.PI*0.12, true); ctx.fill();
    ctx.fillRect(cx-14, 6, 6, 9); ctx.fillRect(cx+8, 6, 6, 9);
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(cx-5, 12, 2.5, 0, Math.PI*2); ctx.arc(cx+5, 12, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#111'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(cx-8,7); ctx.lineTo(cx-2,9); ctx.moveTo(cx+8,7); ctx.lineTo(cx+2,9); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-5,17); ctx.lineTo(cx+5,17); ctx.stroke();
  }

  _drawSpeeder() {
    const w = this.w, h = this.h, cx = w / 2;
    const sw = Math.sin(this.frame * Math.PI / 2) * 0.55;
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(cx, h+3, 14, 4, 0, 0, Math.PI*2); ctx.fill();
    // speed streaks
    ctx.strokeStyle = 'rgba(80,180,255,0.35)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.moveTo(-8, h/2 - 8 + i*9); ctx.lineTo(-22 - i*5, h/2 - 8 + i*9); ctx.stroke();
    }
    // legs
    ctx.save(); ctx.translate(cx-7, h-20); ctx.rotate(sw);
    ctx.fillStyle = '#001850'; ctx.fillRect(-5, 0, 10, 9);
    ctx.fillStyle = '#C8B090'; ctx.fillRect(-4, 9, 8, 11);
    ctx.fillStyle = '#001850'; ctx.fillRect(-6, 19, 12, 6); ctx.restore();
    ctx.save(); ctx.translate(cx+7, h-20); ctx.rotate(-sw);
    ctx.fillStyle = '#001850'; ctx.fillRect(-5, 0, 10, 9);
    ctx.fillStyle = '#C8B090'; ctx.fillRect(-4, 9, 8, 11);
    ctx.fillStyle = '#001850'; ctx.fillRect(-5, 19, 12, 6); ctx.restore();
    // body — blue + white top stripe
    const bg = ctx.createLinearGradient(0, 14, 0, h-16);
    bg.addColorStop(0, '#0044CC'); bg.addColorStop(1, '#0022AA');
    ctx.fillStyle = bg; ctx.fillRect(3, 14, w-6, h-30);
    ctx.fillStyle = '#fff'; ctx.fillRect(3, 14, w-6, (h-30)*0.33);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 8px Arial'; ctx.textAlign = 'center';
    ctx.fillText('11', cx, h-20);
    // arms
    ctx.save(); ctx.translate(3, 20); ctx.rotate(-sw*0.4);
    ctx.fillStyle = '#0044CC'; ctx.fillRect(-8, 0, 9, 13);
    ctx.fillStyle = '#C8B090'; ctx.fillRect(-7, 12, 8, 9); ctx.restore();
    ctx.save(); ctx.translate(w-3, 20); ctx.rotate(sw*0.4);
    ctx.fillStyle = '#0044CC'; ctx.fillRect(0, 0, 8, 13);
    ctx.fillStyle = '#C8B090'; ctx.fillRect(0, 12, 7, 9); ctx.restore();
    // head
    ctx.fillStyle = '#C8B090';
    ctx.beginPath(); ctx.arc(cx, 9, 12, 0, Math.PI*2); ctx.fill();
    // spiky blonde hair
    ctx.fillStyle = '#D4A800';
    ctx.beginPath();
    ctx.moveTo(cx-10, 4); ctx.lineTo(cx-14, -5); ctx.lineTo(cx-6, 1);
    ctx.lineTo(cx, -7); ctx.lineTo(cx+6, 1); ctx.lineTo(cx+14, -5); ctx.lineTo(cx+10, 4);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(cx-4, 9, 2, 0, Math.PI*2); ctx.arc(cx+4, 9, 2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx-7,5); ctx.lineTo(cx-2,7); ctx.moveTo(cx+7,5); ctx.lineTo(cx+2,7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-4,14); ctx.lineTo(cx+4,14); ctx.stroke();
  }

  _drawJumper() {
    const w = this.w, h = this.h, cx = w / 2;
    const sw = Math.sin(this.frame * Math.PI / 2) * 0.40;
    ctx.fillStyle = 'rgba(0,0,0,0.20)';
    ctx.beginPath(); ctx.ellipse(cx, h+3, 16, 4, 0, 0, Math.PI*2); ctx.fill();
    // spring coil under feet when on ground
    if (this.onGround) {
      ctx.strokeStyle = '#2A8A2A'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(cx-9, h-20+i*4); ctx.lineTo(cx-15, h-16+i*4);
        ctx.moveTo(cx+9, h-20+i*4); ctx.lineTo(cx+15, h-16+i*4);
        ctx.stroke();
      }
    }
    // legs
    ctx.save(); ctx.translate(cx-8, h-22); ctx.rotate(sw);
    ctx.fillStyle = '#1A3A1A'; ctx.fillRect(-5, 0, 10, 10);
    ctx.fillStyle = '#D0A878'; ctx.fillRect(-4, 10, 8, 12);
    ctx.fillStyle = '#228B22'; ctx.fillRect(-6, 21, 12, 6); ctx.restore();
    ctx.save(); ctx.translate(cx+8, h-22); ctx.rotate(-sw);
    ctx.fillStyle = '#1A3A1A'; ctx.fillRect(-5, 0, 10, 10);
    ctx.fillStyle = '#D0A878'; ctx.fillRect(-4, 10, 8, 12);
    ctx.fillStyle = '#228B22'; ctx.fillRect(-5, 21, 12, 6); ctx.restore();
    // body — green with gold stripe
    const bg = ctx.createLinearGradient(0, 16, 0, h-18);
    bg.addColorStop(0, '#228B22'); bg.addColorStop(1, '#145214');
    ctx.fillStyle = bg; ctx.fillRect(3, 16, w-6, h-34);
    ctx.fillStyle = '#FFD700'; ctx.fillRect(3, 16, w-6, (h-34)*0.28);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 8px Arial'; ctx.textAlign = 'center';
    ctx.fillText('7', cx, h-22);
    // arms
    ctx.save(); ctx.translate(3, 22); ctx.rotate(-sw*0.5);
    ctx.fillStyle = '#228B22'; ctx.fillRect(-8, 0, 9, 13);
    ctx.fillStyle = '#D0A878'; ctx.fillRect(-7, 12, 8, 9); ctx.restore();
    ctx.save(); ctx.translate(w-3, 22); ctx.rotate(sw*0.5);
    ctx.fillStyle = '#228B22'; ctx.fillRect(0, 0, 8, 13);
    ctx.fillStyle = '#D0A878'; ctx.fillRect(0, 12, 7, 9); ctx.restore();
    // head
    ctx.fillStyle = '#D0A878';
    ctx.beginPath(); ctx.arc(cx, 10, 13, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1A3A1A';
    ctx.beginPath(); ctx.arc(cx, 4, 13, Math.PI*0.9, Math.PI*0.1, true); ctx.fill();
    // curly green tufts
    ctx.fillStyle = '#228B22';
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath(); ctx.arc(cx + i*7, 0, 4, 0, Math.PI*2); ctx.fill();
    }
    // wide eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx-4, 10, 3.5, 0, Math.PI*2); ctx.arc(cx+4, 10, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(cx-4, 10, 2, 0, Math.PI*2); ctx.arc(cx+4, 10, 2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx-4, 15); ctx.lineTo(cx+4, 15); ctx.stroke();
  }

  _drawBoss() {
    const w = this.w, h = this.h, cx = w / 2;
    const sw = Math.sin(this.frame * Math.PI / 2) * 0.30;
    const t = Date.now() / 600;
    // aura glow
    ctx.save();
    ctx.globalAlpha = 0.15 + Math.sin(t) * 0.08;
    const gr = ctx.createRadialGradient(cx, h/2, 0, cx, h/2, w * 0.9);
    gr.addColorStop(0, '#FF3300'); gr.addColorStop(1, 'transparent');
    ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(cx, h/2, w * 0.9, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // RAGE aura
    if (this.raging) {
      ctx.save();
      ctx.globalAlpha = 0.30 + Math.abs(Math.sin(t * 5)) * 0.18;
      const rg = ctx.createRadialGradient(cx, h/2, 0, cx, h/2, w * 1.15);
      rg.addColorStop(0, '#FF0000'); rg.addColorStop(1, 'transparent');
      ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(cx, h/2, w*1.15, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,50,0,0.55)'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath(); ctx.moveTo(-14-i*8, h/2-6+i*10); ctx.lineTo(-36-i*13, h/2-6+i*10); ctx.stroke();
      }
      ctx.restore();
    }
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.beginPath(); ctx.ellipse(cx, h+4, 30, 8, 0, 0, Math.PI*2); ctx.fill();
    // thick legs
    ctx.save(); ctx.translate(cx-14, h-34); ctx.rotate(sw);
    ctx.fillStyle = '#1A0A00'; ctx.fillRect(-8, 0, 16, 15);
    ctx.fillStyle = '#CC8855'; ctx.fillRect(-7, 15, 14, 19);
    ctx.fillStyle = '#7A0000'; ctx.fillRect(-9, 33, 18, 9); ctx.restore();
    ctx.save(); ctx.translate(cx+14, h-34); ctx.rotate(-sw);
    ctx.fillStyle = '#1A0A00'; ctx.fillRect(-8, 0, 16, 15);
    ctx.fillStyle = '#CC8855'; ctx.fillRect(-7, 15, 14, 19);
    ctx.fillStyle = '#7A0000'; ctx.fillRect(-7, 33, 18, 9); ctx.restore();
    // body — dark crimson
    const bg = ctx.createLinearGradient(0, 22, 0, h-30);
    bg.addColorStop(0, '#8B0000'); bg.addColorStop(0.5, '#600000'); bg.addColorStop(1, '#3A0000');
    ctx.fillStyle = bg; ctx.fillRect(6, 22, w-12, h-52);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 17px Arial'; ctx.textAlign = 'center';
    ctx.fillText('☠', cx, h-33);
    // thick arms
    ctx.save(); ctx.translate(6, 28); ctx.rotate(-sw*0.4);
    ctx.fillStyle = '#8B0000'; ctx.fillRect(-12, 0, 13, 22);
    ctx.fillStyle = '#CC8855'; ctx.fillRect(-11, 20, 12, 14); ctx.restore();
    ctx.save(); ctx.translate(w-6, 28); ctx.rotate(sw*0.4);
    ctx.fillStyle = '#8B0000'; ctx.fillRect(0, 0, 12, 22);
    ctx.fillStyle = '#CC8855'; ctx.fillRect(0, 20, 11, 14); ctx.restore();
    // big head
    ctx.fillStyle = '#CC8855';
    ctx.beginPath(); ctx.arc(cx, 14, 21, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1A0A00';
    ctx.beginPath(); ctx.arc(cx, 6, 21, Math.PI*0.85, Math.PI*0.15, true); ctx.fill();
    ctx.fillRect(cx-21, 5, 8, 13); ctx.fillRect(cx+13, 5, 8, 13);
    // devil horns
    ctx.fillStyle = '#8B0000';
    ctx.beginPath(); ctx.moveTo(cx-17, 0); ctx.lineTo(cx-24, -16); ctx.lineTo(cx-8, 2); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+17, 0); ctx.lineTo(cx+24, -16); ctx.lineTo(cx+8, 2); ctx.closePath(); ctx.fill();
    // glowing red eyes
    ctx.fillStyle = '#FF0000';
    ctx.beginPath(); ctx.arc(cx-7, 14, 4.5, 0, Math.PI*2); ctx.arc(cx+7, 14, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFD700';

    // brows

    // snarl
    ctx.strokeStyle = '#5A1010'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(cx-9, 21); ctx.lineTo(cx-5, 25); ctx.lineTo(cx, 22); ctx.lineTo(cx+5, 25); ctx.lineTo(cx+9, 21); ctx.stroke();
    // hp stars below
    ctx.globalAlpha = 1;
    for (let i = 0; i < this.maxHp; i++) {
      ctx.fillStyle = i < this.hp ? '#FFD700' : '#333';
      ctx.font = '14px serif'; ctx.textAlign = 'center';
      ctx.fillText('★', cx - (this.maxHp-1)*9 + i*18, h + 18);
    }
  }

  _drawStunBoss() {
    const w = this.w, h = this.h, cx = w / 2;
    const t = Date.now() / 500;
    // wobble when confused
    const wobble = this.confused ? Math.sin(t * 6) * 0.22 : 0;
    ctx.save(); ctx.translate(cx, h/2); ctx.rotate(wobble); ctx.translate(-cx, -h/2);
    const sw = this.confused ? Math.sin(t * 5) * 0.28 : Math.sin(this.frame * Math.PI / 2) * 0.28;
    // aura — purple normally, blue when stunned
    ctx.save();
    ctx.globalAlpha = 0.16 + Math.sin(t) * 0.07;
    const auraCol = this.confused ? '#44AAFF' : '#8800CC';
    const gr = ctx.createRadialGradient(cx, h/2, 0, cx, h/2, w * 0.95);
    gr.addColorStop(0, auraCol); gr.addColorStop(1, 'transparent');
    ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(cx, h/2, w * 0.95, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // RAGE aura
    if (this.raging && !this.confused) {
      ctx.save();
      ctx.globalAlpha = 0.28 + Math.abs(Math.sin(t * 4)) * 0.16;
      const rg2 = ctx.createRadialGradient(cx, h/2, 0, cx, h/2, w * 1.2);
      rg2.addColorStop(0, '#FF0088'); rg2.addColorStop(1, 'transparent');
      ctx.fillStyle = rg2; ctx.beginPath(); ctx.arc(cx, h/2, w*1.2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,0,100,0.5)'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath(); ctx.moveTo(-15-i*9, h/2-5+i*11); ctx.lineTo(-38-i*14, h/2-5+i*11); ctx.stroke();
      }
      ctx.restore();
    }
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.beginPath(); ctx.ellipse(cx, h+4, 30, 8, 0, 0, Math.PI*2); ctx.fill();
    // flowing robe / cape
    ctx.fillStyle = this.confused ? '#224488' : '#440088';
    ctx.beginPath();
    ctx.moveTo(8, h-32); ctx.lineTo(0, h+4); ctx.lineTo(w, h+4); ctx.lineTo(w-8, h-32);
    ctx.closePath(); ctx.fill();
    // robe highlights
    ctx.fillStyle = this.confused ? '#3366AA' : '#6600AA';
    ctx.beginPath();
    ctx.moveTo(cx-5, h-32); ctx.lineTo(cx-8, h+4); ctx.lineTo(cx+8, h+4); ctx.lineTo(cx+5, h-32);
    ctx.closePath(); ctx.fill();
    // belt
    ctx.fillStyle = '#FFD700'; ctx.fillRect(6, h-38, w-12, 7);
    // thick arms
    ctx.save(); ctx.translate(6, h-50); ctx.rotate(-sw*0.5);
    ctx.fillStyle = this.confused ? '#224488' : '#440088';
    ctx.fillRect(-14, 0, 14, 22);
    ctx.fillStyle = '#CC8855'; ctx.fillRect(-13, 20, 13, 14); ctx.restore();
    ctx.save(); ctx.translate(w-6, h-50); ctx.rotate(sw*0.5);
    ctx.fillStyle = this.confused ? '#224488' : '#440088';
    ctx.fillRect(0, 0, 14, 22);
    ctx.fillStyle = '#CC8855'; ctx.fillRect(0, 20, 13, 14); ctx.restore();
    // neck
    ctx.fillStyle = '#CC8855'; ctx.fillRect(cx-8, h-60, 16, 14);
    // big head
    ctx.fillStyle = '#CC8855';
    ctx.beginPath(); ctx.arc(cx, h-72, 22, 0, Math.PI*2); ctx.fill();
    // wizard hat
    ctx.fillStyle = this.confused ? '#113366' : '#330066';
    ctx.beginPath();
    ctx.moveTo(cx-22, h-60); ctx.lineTo(cx, h-120); ctx.lineTo(cx+22, h-60);
    ctx.closePath(); ctx.fill();
    // hat brim
    ctx.fillStyle = this.confused ? '#224488' : '#440099';
    ctx.fillRect(cx-28, h-62, 56, 8);
    // hat star
    ctx.fillStyle = '#FFD700'; ctx.font = '12px serif'; ctx.textAlign = 'center';
    ctx.fillText('★', cx, h-88);
    // eyes — spiral/dizzy when confused, glowing purple normally
    if (this.confused) {
      ctx.strokeStyle = '#44CCFF'; ctx.lineWidth = 2;
      for (let eye = -1; eye <= 1; eye += 2) {
        const ex = cx + eye * 8, ey = h-72;
        for (let r = 1; r <= 3; r++) {
          ctx.beginPath(); ctx.arc(ex, ey, r * 2.2, 0, Math.PI * 1.6); ctx.stroke();
        }
      }
    } else {
      ctx.fillStyle = '#CC00FF';
      ctx.beginPath(); ctx.arc(cx-8, h-72, 4.5, 0, Math.PI*2); ctx.arc(cx+8, h-72, 4.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFD700';
      ctx.beginPath(); ctx.arc(cx-8, h-72, 1.8, 0, Math.PI*2); ctx.arc(cx+8, h-72, 1.8, 0, Math.PI*2); ctx.fill();
    }
    // brows
    ctx.strokeStyle = '#330022'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx-14, h-78); ctx.lineTo(cx-4, h-75);
    ctx.moveTo(cx+14, h-78); ctx.lineTo(cx+4, h-75); ctx.stroke();
    // mouth — confused gape vs snarl
    ctx.strokeStyle = '#5A2020'; ctx.lineWidth = 2.5;
    if (this.confused) {
      ctx.beginPath(); ctx.arc(cx, h-65, 6, 0, Math.PI); ctx.stroke(); // open mouth
    } else {
      ctx.beginPath(); ctx.moveTo(cx-8,h-65); ctx.lineTo(cx-4,h-61); ctx.lineTo(cx,h-63);
      ctx.lineTo(cx+4,h-61); ctx.lineTo(cx+8,h-65); ctx.stroke();
    }
    // hp stars
    ctx.globalAlpha = 1;
    for (let i = 0; i < this.maxHp; i++) {
      ctx.fillStyle = i < this.hp ? '#FFD700' : '#333';
      ctx.font = '13px serif'; ctx.textAlign = 'center';
      ctx.fillText('★', cx - (this.maxHp-1)*8 + i*16, h + 18);
    }
    ctx.restore(); // undo wobble
  }

  _drawKeeper() {
    const w = this.w, h = this.h, cx = w / 2;
    const t = Date.now() / 500;
    const sw = Math.sin(this.frame * Math.PI / 2) * 0.32;

    // ── Aura glow (green) ─────────────────────────────────────────────────
    ctx.save(); ctx.globalAlpha = 0.14 + Math.sin(t) * 0.06;
    const gr = ctx.createRadialGradient(cx, h/2, 0, cx, h/2, w * 0.95);
    gr.addColorStop(0, '#00DD66'); gr.addColorStop(1, 'transparent');
    ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(cx, h/2, w * 0.95, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    if (this.raging) {
      ctx.save(); ctx.globalAlpha = 0.28 + Math.abs(Math.sin(t*4))*0.14;
      const rg = ctx.createRadialGradient(cx, h/2, 0, cx, h/2, w * 1.2);
      rg.addColorStop(0, '#FF6600'); rg.addColorStop(1, 'transparent');
      ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(cx, h/2, w*1.2, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath(); ctx.ellipse(cx, h+4, 32, 8, 0, 0, Math.PI*2); ctx.fill();

    // Legs
    ctx.save(); ctx.translate(cx-12, h-32); ctx.rotate(sw);
    ctx.fillStyle = '#003300'; ctx.fillRect(-7, 0, 14, 14);
    ctx.fillStyle = '#CCB888'; ctx.fillRect(-6, 14, 12, 18);
    ctx.fillStyle = '#226622'; ctx.fillRect(-8, 31, 16, 8); ctx.restore();
    ctx.save(); ctx.translate(cx+12, h-32); ctx.rotate(-sw);
    ctx.fillStyle = '#003300'; ctx.fillRect(-7, 0, 14, 14);
    ctx.fillStyle = '#CCB888'; ctx.fillRect(-6, 14, 12, 18);
    ctx.fillStyle = '#226622'; ctx.fillRect(-7, 31, 16, 8); ctx.restore();

    // Body — fluorescent yellow/green keeper kit
    const bodyG = ctx.createLinearGradient(0, 20, 0, h-30);
    bodyG.addColorStop(0, this.raging ? '#FF6600' : '#AACC00');
    bodyG.addColorStop(1, this.raging ? '#CC3300' : '#558800');
    ctx.fillStyle = bodyG; ctx.fillRect(5, 20, w-10, h-50);
    ctx.fillStyle = '#003300'; ctx.fillRect(5, 20, w-10, (h-50)*0.22); // dark collar stripe
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
    ctx.fillText('GK', cx, h-33);

    // Big keeper gloves
    ctx.save(); ctx.translate(5, 26); ctx.rotate(-sw*0.5);
    ctx.fillStyle = '#228B22'; ctx.fillRect(-14, 0, 14, 20);
    ctx.fillStyle = '#44AA44'; ctx.fillRect(-16, 18, 16, 10); // glove
    ctx.strokeStyle = '#000'; ctx.lineWidth = 0.8;
    for (let f = 0; f < 3; f++) ctx.strokeRect(-14+f*4, 20, 3, 8); // fingers
    ctx.restore();
    ctx.save(); ctx.translate(w-5, 26); ctx.rotate(sw*0.5);
    ctx.fillStyle = '#228B22'; ctx.fillRect(0, 0, 14, 20);
    ctx.fillStyle = '#44AA44'; ctx.fillRect(0, 18, 16, 10);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 0.8;
    for (let f = 0; f < 3; f++) ctx.strokeRect(2+f*4, 20, 3, 8);
    ctx.restore();

    // Head
    ctx.fillStyle = '#CCB888';
    ctx.beginPath(); ctx.arc(cx, 14, 19, 0, Math.PI*2); ctx.fill();
    // Keeper gloves on head (cap)
    ctx.fillStyle = this.raging ? '#FF6600' : '#228B22';
    ctx.beginPath(); ctx.arc(cx, 7, 19, Math.PI*0.88, Math.PI*0.12, true); ctx.fill();
    ctx.fillRect(cx-19, 6, 9, 11); ctx.fillRect(cx+10, 6, 9, 11);
    // Cap brim
    ctx.fillStyle = this.raging ? '#AA3300' : '#145214';
    ctx.fillRect(cx-22, 14, 44, 5);
    // Eyes — determined/focused
    ctx.fillStyle = '#1A0800';
    ctx.beginPath(); ctx.arc(cx-6, 15, 3, 0, Math.PI*2); ctx.arc(cx+6, 15, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx-5, 14, 1, 0, Math.PI*2); ctx.arc(cx+7, 14, 1, 0, Math.PI*2); ctx.fill();
    // Determined brows
    ctx.strokeStyle = '#1A0800'; ctx.lineWidth = 2.8;
    ctx.beginPath(); ctx.moveTo(cx-11, 8); ctx.lineTo(cx-2, 11);
    ctx.moveTo(cx+11, 8); ctx.lineTo(cx+2, 11); ctx.stroke();
    // Mouth — grim/focused
    ctx.strokeStyle = '#7A3A10'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx-6, 21); ctx.lineTo(cx+6, 21); ctx.stroke();

    // HP stars
    ctx.globalAlpha = 1;
    for (let i = 0; i < this.maxHp; i++) {
      ctx.fillStyle = i < this.hp ? '#44DD88' : '#333';
      ctx.font = '14px serif'; ctx.textAlign = 'center';
      ctx.fillText('★', cx - (this.maxHp-1)*9 + i*18, h + 18);
    }
  }
}

// ─── Cat Companion (British Shorthair) ───────────────────────────────────────
class Cat {
  constructor(player) {
    this.x = player.x - 50;
    this.y = player.y + player.h - 28;
    this.w = 36; this.h = 30;
    this.vx = 0; this.vy = 0;
    this.facing = true;
    this.mode = 'follow'; // 'follow' | 'attack' | 'return'
    this.attackCD = 0;
    this.tailWag = 0;
    this.frame = 0; this.fTimer = 0;
  }

  launch(player) {
    if (this.mode !== 'follow' || this.attackCD > 0) return false;
    this.mode = 'attack';
    this.vx = player.facing ? 14 : -14;
    this.vy = -12;
    this.facing = player.facing;
    sfxCat();
    return true;
  }

  // Returns points scored (0 or 100)
  update(player, enemies, platformList) {
    this.tailWag += 0.07;
    this.fTimer++;
    if (this.fTimer >= 10) { this.frame = (this.frame + 1) % 4; this.fTimer = 0; }
    if (this.attackCD > 0) this.attackCD--;

    if (this.mode === 'follow') {
      const offX = player.facing ? -54 : player.w + 18;
      this.x += (player.x + offX - this.x) * 0.13;
      this.y += (player.y + player.h - this.h - this.y) * 0.13;
      this.facing = player.facing;
      return 0;
    }

    if (this.mode === 'attack') {
      this.vy += GRAVITY;
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= 0.997;
      let onGround = false;
      for (const p of platformList) {
        if (this.x + this.w > p.x && this.x < p.x + p.w &&
            this.y + this.h > p.y && this.y + this.h < p.y + p.h + 14 && this.vy >= 0) {
          this.y = p.y - this.h; this.vy = 0; this.vx *= 0.8; onGround = true;
        }
      }
      for (const e of enemies) {
        if (!e.alive) continue;
        // Cat must land on top of enemy head
        if (this.x + this.w > e.x + 4 && this.x < e.x + e.w - 4 &&
            this.y + this.h > e.y && this.y + this.h < e.y + 26 && this.vy > 0) {
          if (e.type === 'stun-boss') {
            if (!e.confused) {
              e.stun();
              sfxStun();
              spawnParticles(e.x + e.w/2, e.y, 30, ['#88CCFF','#CCE8FF','#fff','#AADDFF']);
              addText(e.x + e.w/2, e.y - 24, '😵 STUNNED! Now kick the ball!', '#88CCFF');
            }
            this.vy = -11; this.mode = 'return'; this.attackCD = 80;
          } else {
            e.die();
            this.vy = -10; this.mode = 'return'; this.attackCD = 50;
            spawnParticles(this.x + this.w/2, this.y, 22,
              ['#8090A0','#B0C0CC','#fff','#AAB8C4']);
            addText(e.x + e.w/2, e.y - 20, 'POUNCE! +150', '#B0C0CC');
            return 150;
          }
          break;
        }
      }
      if (this.x < -400 || this.x > 12000 || this.y > 880) this.mode = 'return';
      if (onGround && Math.abs(this.vx) < 1.0) { this.mode = 'return'; this.attackCD = 40; }
      return 0;
    }

    if (this.mode === 'return') {
      const dx = player.x + player.w/2 - this.x;
      const dy = player.y + player.h/2 - this.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 45) {
        this.mode = 'follow';
      } else {
        const spd = Math.min(14, 5 + dist / 60);
        this.x += (dx / dist) * spd;
        this.y += (dy / dist) * spd;
        this.facing = dx > 0;
      }
    }
    return 0;
  }

  draw(camX) {
    const sx = this.x - camX;
    if (sx < -80 || sx > W + 80) return;
    ctx.save();
    ctx.translate(sx + (this.facing ? 0 : this.w), this.y);
    ctx.scale(this.facing ? 1 : -1, 1);
    this._drawBSH();
    ctx.restore();
  }

  _drawBSH() {
    // British Shorthair: blue-grey, stocky, chubby round face, amber eyes
    const w = this.w, h = this.h;
    const tw = Math.sin(this.tailWag) * 0.38;
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(w/2, h+3, 15, 4, 0, 0, Math.PI*2); ctx.fill();
    // tail (thick, grey)
    ctx.save(); ctx.translate(3, h-5); ctx.rotate(tw - 0.25);
    ctx.strokeStyle = '#687888'; ctx.lineWidth = 6; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(-12,-14,-4,-26); ctx.stroke();
    ctx.fillStyle = '#8090A0'; ctx.beginPath(); ctx.arc(-4,-26,6,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // body (stocky, round)
    ctx.fillStyle = '#8090A0';
    ctx.beginPath(); ctx.ellipse(w/2, h-8, 15, 11, 0, 0, Math.PI*2); ctx.fill();
    // belly (lighter grey)
    ctx.fillStyle = '#B8C8D4';
    ctx.beginPath(); ctx.ellipse(w/2+1, h-7, 9, 7, 0, 0, Math.PI*2); ctx.fill();
    // legs + paws
    ctx.fillStyle = '#8090A0';
    ctx.fillRect(w/2-11, h-4, 9, 8); ctx.fillRect(w/2+2, h-4, 9, 8);
    ctx.fillStyle = '#B8C8D4';
    ctx.beginPath();
    ctx.ellipse(w/2-6, h+3, 6, 3.5, 0, 0, Math.PI*2);
    ctx.ellipse(w/2+7, h+3, 6, 3.5, 0, 0, Math.PI*2); ctx.fill();
    // head (very round — BSH trademark chubby face)
    ctx.fillStyle = '#8090A0';
    ctx.beginPath(); ctx.arc(w/2+1, h-21, 13, 0, Math.PI*2); ctx.fill();
    // chubby cheeks (slightly lighter)
    ctx.fillStyle = '#9AAAB6';
    ctx.beginPath(); ctx.arc(w/2-6, h-17, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w/2+8, h-17, 6, 0, Math.PI*2); ctx.fill();
    // ears (small, wide-set, rounded — BSH style)
    ctx.fillStyle = '#8090A0';
    ctx.beginPath(); ctx.moveTo(w/2-7,h-29); ctx.lineTo(w/2-13,h-39); ctx.lineTo(w/2-1,h-31); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(w/2+9,h-29); ctx.lineTo(w/2+15,h-39); ctx.lineTo(w/2+3,h-31); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#C0A0B0';
    ctx.beginPath(); ctx.moveTo(w/2-7,h-31); ctx.lineTo(w/2-11,h-37); ctx.lineTo(w/2-2,h-32); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(w/2+9,h-31); ctx.lineTo(w/2+13,h-37); ctx.lineTo(w/2+4,h-32); ctx.closePath(); ctx.fill();
    // eyes (large round amber/copper — BSH signature)
    const blink = Math.sin(this.tailWag * 0.22) > 0.92;
    if (!blink) {
      ctx.fillStyle = '#C87818'; // copper-amber
      ctx.beginPath();
      ctx.arc(w/2-3, h-21, 3.8, 0, Math.PI*2);
      ctx.arc(w/2+5, h-21, 3.8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1A0800';
      ctx.beginPath();
      ctx.ellipse(w/2-3, h-21, 1.3, 3.0, 0, 0, Math.PI*2);
      ctx.ellipse(w/2+5, h-21, 1.3, 3.0, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath(); ctx.arc(w/2-1.5, h-22.5, 1.1, 0, Math.PI*2);
      ctx.arc(w/2+6.5, h-22.5, 1.1, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.strokeStyle = '#1A0800'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(w/2-6, h-21); ctx.lineTo(w/2, h-21);
      ctx.moveTo(w/2+2, h-21); ctx.lineTo(w/2+8, h-21); ctx.stroke();
    }
    // nose (small pink-grey)
    ctx.fillStyle = '#CC8899';
    ctx.beginPath(); ctx.moveTo(w/2+1,h-17); ctx.lineTo(w/2-1,h-15); ctx.lineTo(w/2+3,h-15); ctx.closePath(); ctx.fill();
    // short whiskers
    ctx.strokeStyle = 'rgba(210,225,235,0.85)'; ctx.lineWidth = 0.9; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(w/2-2,h-15); ctx.lineTo(w/2-15,h-17);
    ctx.moveTo(w/2-2,h-14); ctx.lineTo(w/2-15,h-13);
    ctx.moveTo(w/2+4,h-15); ctx.lineTo(w/2+17,h-17);
    ctx.moveTo(w/2+4,h-14); ctx.lineTo(w/2+17,h-13);
    ctx.stroke();
    // attack glow (cool blue-grey)
    if (this.mode === 'attack') {
      ctx.save(); ctx.globalAlpha = 0.42;
      const gr = ctx.createRadialGradient(w/2, h-14, 0, w/2, h-14, 24);
      gr.addColorStop(0, '#AACCEE'); gr.addColorStop(1, 'transparent');
      ctx.fillStyle = gr;
      ctx.beginPath(); ctx.arc(w/2, h-14, 24, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    // cooldown dot
    if (this.attackCD > 0 && this.mode === 'follow') {
      ctx.globalAlpha = 0.75;
      ctx.fillStyle = '#FF7766';
      ctx.beginPath(); ctx.arc(w/2+1, h-44, 4, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

// ─── Soccer Goal ──────────────────────────────────────────────────────────────
class SoccerGoal {
  constructor(x, groundY) {
    this.x = x;
    this.w = 150;
    this.h = 170;
    this.y = groundY - this.h;
    this.postW = 10;
    this.scored = false;
    this.flash = 0;
  }

  checkBall(ball) {
    if (this.scored) return false;
    // Ball enters from the left opening
    if (ball.active && !ball.returning &&
        ball.vx > 0 &&
        ball.x + ball.r > this.x + this.postW &&
        ball.x - ball.r < this.x + this.w &&
        ball.y > this.y + this.postW &&
        ball.y < this.y + this.h) {
      this.scored = true;
      this.flash = 100;
      return true;
    }
    return false;
  }

  draw(camX, bossAlive) {
    const sx = this.x - camX;
    if (sx > W + 220 || sx + this.w < -220) return;
    const gx = sx, gy = this.y, gw = this.w, gh = this.h, pw = this.postW;

    // Net mesh
    ctx.save();
    ctx.strokeStyle = this.scored ? 'rgba(255,255,100,0.7)' : bossAlive ? 'rgba(255,100,100,0.25)' : 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= gw; x += 15) {
      ctx.beginPath(); ctx.moveTo(gx+x, gy); ctx.lineTo(gx+x, gy+gh); ctx.stroke();
    }
    for (let y = 0; y <= gh; y += 15) {
      ctx.beginPath(); ctx.moveTo(gx, gy+y); ctx.lineTo(gx+gw, gy+y); ctx.stroke();
    }
    ctx.restore();

    // Goal flash fill
    if (this.flash > 0) {
      ctx.save();
      ctx.globalAlpha = (this.flash / 100) * 0.55;
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(gx+pw, gy+pw, gw-pw, gh-pw);
      ctx.restore();
      this.flash--;
    }

    // Posts
    ctx.shadowBlur = 8; ctx.shadowColor = '#fff';
    ctx.fillStyle = '#EEEEEE';
    ctx.fillRect(gx, gy, pw, gh + pw);           // left post
    ctx.fillRect(gx, gy, gw + pw, pw);           // crossbar
    ctx.fillStyle = '#CCCCCC';
    ctx.fillRect(gx + gw, gy, pw, gh + pw);      // right post (back)
    ctx.shadowBlur = 0;

    // "KICK HERE" label / locked label
    ctx.save();
    if (bossAlive) {
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#FF6644'; ctx.font = 'bold 17px Arial'; ctx.textAlign = 'center';
      ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
      ctx.strokeText('⚔ Defeat Boss First!', gx + gw/2 + pw/2, gy - 12);
      ctx.fillText('⚔ Defeat Boss First!', gx + gw/2 + pw/2, gy - 12);
    } else if (!this.scored) {
      const pulse = Math.sin(Date.now() / 380) * 0.35 + 0.65;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
      ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
      ctx.strokeText('⚽  SHOOT HERE!', gx + gw/2 + pw/2, gy - 12);
      ctx.fillText('⚽  SHOOT HERE!', gx + gw/2 + pw/2, gy - 12);
    }
    ctx.restore();
  }
}

// ─── Soccer Ball ──────────────────────────────────────────────────────────────
class Ball {
  constructor() {
    this.x = 0; this.y = 0; this.r = 13;
    this.vx = 0; this.vy = 0;
    this.rot = 0;
    this.active = false;
    this.returning = false;
    this.trail = [];
    this.catchFlash = 0;
  }
  attach(player) {
    this.x = player.x + (player.facing ? player.w + 10 : -10);
    this.y = player.y + player.h - 22;
  }
  kick(player) {
    if (this.active) return;
    this.x  = player.x + (player.facing ? player.w + 6 : -6);
    this.y  = player.y + player.h - 20;
    this.vx = player.facing ? 16 : -16;
    this.vy = -4.5;
    this.active    = true;
    this.returning = false;
    this.trail     = [];
    sfxKick();
  }
  // Returns points scored (0 or >0)
  update(player, enemies, platformList) {
    if (!this.active) { this.attach(player); return 0; }

    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 14) this.trail.shift();

    if (this.returning) {
      const tx = player.x + player.w / 2;
      const ty = player.y + player.h / 2;
      const dx = tx - this.x, dy = ty - this.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 28) {
        this.active = false; this.returning = false;
        this.trail = []; this.catchFlash = 12;
        sfxCatch();
        return 0;
      }
      const spd = Math.min(16, 7 + (400 - Math.min(dist, 400)) / 40);
      this.vx = (dx / dist) * spd;
      this.vy = (dy / dist) * spd;
    } else {
      this.vy += GRAVITY * 0.38;
      // platform bounce
      for (const p of platformList) {
        const inX = this.x + this.r > p.x && this.x - this.r < p.x + p.w;
        const inY = this.y + this.r > p.y && this.y - this.r < p.y + p.h;
        if (inX) {
          if (this.y + this.r > p.y && this.y - this.r < p.y + this.r*2 && this.vy > 0) {
            this.y = p.y - this.r; this.vy *= -0.52; this.vx *= 0.84;
          } else if (this.y - this.r < p.y + p.h && this.y > p.y + p.h - 5 && this.vy < 0) {
            this.y = p.y + p.h + this.r; this.vy *= -0.52;
          }
        }
        if (inY) {
          if (this.x + this.r > p.x && this.x + this.r < p.x + 18 && this.vx > 0) {
            this.x = p.x - this.r; this.vx *= -0.65;
          }
          if (this.x - this.r < p.x + p.w && this.x - this.r > p.x + p.w - 18 && this.vx < 0) {
            this.x = p.x + p.w + this.r; this.vx *= -0.65;
          }
        }
      }
      if (this.x < -300 || this.y > 850) this.returning = true;
      if (Math.abs(this.vx) < 1.2 && this.vy > 0 && this.y > 580) this.returning = true;
      this.vx *= 0.999;
      // Keeper-boss: check if ball slips into goal zone past the keeper
      for (const e of enemies) {
        if (!e.alive || e.type !== 'keeper-boss') continue;
        const goalLeft  = e.startX - e.goalHalfW;
        const goalRight = e.startX + e.w + e.goalHalfW;
        const inGoalX = this.x > goalLeft && this.x < goalRight + 12;
        const inGoalY = this.y > e.y - 20 && this.y < e.y + e.h;
        const hitsKeeper = this.x + this.r > e.x + 6 && this.x - this.r < e.x + e.w - 6 &&
                           this.y + this.r > e.y + 6 && this.y - this.r < e.y + e.h - 6;
        if (inGoalX && inGoalY && !hitsKeeper && this.vx > 1 && !this.returning) {
          const dead = e.goalHit();
          this.returning = true; this.vx *= -0.25; this.vy = -5;
          spawnParticles(this.x, this.y, 40, ['#FFD700','#74AADB','#FFFFFF','#44DD88']);
          if (dead) return 500;
          return 0;
        }
      }
      // Enemy collision
      for (const e of enemies) {
        if (!e.alive) continue;
        if (this.x + this.r > e.x && this.x - this.r < e.x + e.w &&
            this.y + this.r > e.y && this.y - this.r < e.y + e.h) {
          const dead = e.hit();
          this.returning = true;
          this.vx *= -0.3; this.vy = -3;
          spawnParticles(this.x, this.y, 22, ['#FFD700','#FFF','#FF8800','#FFE066']);
          if (dead) return (e.type === 'boss' || e.type === 'stun-boss') ? 500 : 100;
          return 0;
        }
      }
    }
    this.x += this.vx;
    this.y += this.vy;
    this.rot += this.vx * 0.09;
    if (this.catchFlash > 0) this.catchFlash--;
    return 0;
  }
  draw(camX) {
    const sx = this.x - camX, sy = this.y;
    // trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const alpha = (i / this.trail.length) * 0.42;
      const r     = this.r * (i / this.trail.length) * 0.75;
      if (r < 1) continue;
      ctx.save(); ctx.globalAlpha = alpha;
      ctx.fillStyle = this.returning ? '#88AAFF' : '#FFFFFFCC';
      ctx.beginPath(); ctx.arc(t.x - camX, t.y, r, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    if (this.returning) {
      ctx.save(); ctx.globalAlpha = 0.28;
      const gr = ctx.createRadialGradient(sx, sy, 0, sx, sy, this.r*2.8);
      gr.addColorStop(0, '#5599FF'); gr.addColorStop(1, 'transparent');
      ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(sx, sy, this.r*2.8, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.save();
    ctx.translate(sx, sy); ctx.rotate(this.rot);
    const bg = ctx.createRadialGradient(-4, -5, 1, 0, 0, this.r);
    bg.addColorStop(0, '#fff'); bg.addColorStop(0.55, '#eee'); bg.addColorStop(1, '#bbb');
    ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2);
    ctx.fillStyle = bg; ctx.fill();
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1.4; ctx.stroke();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i/5)*Math.PI*2 - Math.PI/2;
      i === 0 ? ctx.moveTo(Math.cos(a)*4, Math.sin(a)*4) : ctx.lineTo(Math.cos(a)*4, Math.sin(a)*4);
    }
    ctx.closePath(); ctx.fill();
    for (let j = 0; j < 5; j++) {
      const a = (j/5)*Math.PI*2 - Math.PI/2;
      ctx.save(); ctx.translate(Math.cos(a)*8, Math.sin(a)*8);
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const b = (i/5)*Math.PI*2;
        i === 0 ? ctx.moveTo(Math.cos(b)*2.8, Math.sin(b)*2.8) : ctx.lineTo(Math.cos(b)*2.8, Math.sin(b)*2.8);
      }
      ctx.closePath(); ctx.fill(); ctx.restore();
    }
    ctx.restore();
    if (this.catchFlash > 0) {
      ctx.save(); ctx.globalAlpha = this.catchFlash / 12;
      ctx.strokeStyle = '#44FF88'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(sx, sy, this.r + (12 - this.catchFlash) * 2, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }
  }
}

// ─── Player (Messi) ───────────────────────────────────────────────────────────
class Player {
  constructor(sx, sy) {
    this.spawnX = sx; this.spawnY = sy;
    this.x = sx; this.y = sy;
    this.w = 40; this.h = 62;
    this.vx = 0; this.vy = 0;
    this.onGround = false;
    this.facing = true;
    this.hasBall = true;
    this.kickCD = 0; this.kickTimer = 0;
    this.frame = 0; this.fTimer = 0;
    this.coyote = 0;
    this.lives = 3;
    this.dead = false;
    this.deadTimer = 0;
    this.invincible = 0; // flash frames after respawn
    this.sliding = false;
    this.slideTimer = 0;
  }

  die() {
    if (this.invincible > 0 || this.dead) return;
    this.dead = true;
    this.deadTimer = 90;
    this.lives--;
    this.vy = -9; this.vx = 0;
    sfxDie();
    spawnParticles(this.x + this.w/2, this.y + this.h/2, 50,
      ['#FF4444','#FFD700','#74AADB','#fff','#FF8800']);
    addText(this.x + this.w/2, this.y - 20, this.lives > 0 ? '-1 LIFE!' : 'GAME OVER!', '#FF4444');
  }

  respawn() {
    this.x = this.spawnX; this.y = this.spawnY;
    this.vx = 0; this.vy = 0;
    this.dead = false; this.deadTimer = 0;
    this.invincible = 130;
    this.hasBall = true;
    spawnParticles(this.x + this.w/2, this.y, 20, ['#74AADB','#fff','#FFD700']);
  }

  update(ball, platformList) {
    if (this.invincible > 0) this.invincible--;

    if (this.dead) {
      this.deadTimer--;
      this.vy += GRAVITY;
      this.y += this.vy;
      if (this.deadTimer <= 0 && this.lives > 0) this.respawn();
      return;
    }

    const prevGround = this.onGround;
    let moving = false;
    if (keys['ArrowLeft'] || keys['KeyA']) {
      this.vx += (-SPEED - this.vx) * 0.28; this.facing = false; moving = true;
    } else if (keys['ArrowRight'] || keys['KeyD']) {
      this.vx += ( SPEED - this.vx) * 0.28; this.facing = true;  moving = true;
    } else {
      this.vx *= 0.72;
    }
    const jumpKey = keys['ArrowUp'] || keys['KeyW'] || keys['Space'];
    if (jumpKey && (this.onGround || this.coyote > 0)) {
      this.vy = JUMP_FORCE; this.onGround = false; this.coyote = 0; sfxJump();
    }
    const kickKey = keys['KeyX'] || keys['ShiftLeft'] || keys['ShiftRight'];
    const slideKey = keys['ArrowDown'] || keys['KeyS'];
    // Slide tackle: down + kick on ground
    if (kickKey && slideKey && this.onGround && !this.sliding && this.kickCD <= 0) {
      this.sliding = true;
      this.slideTimer = 30;
      this.vx = this.facing ? 13 : -13;
      this.vy = 0;
      this.kickCD = 44;
    } else if (kickKey && this.hasBall && this.kickCD <= 0 && !this.sliding) {
      ball.kick(this);
      this.hasBall  = false;
      this.kickTimer = 20;
      this.kickCD   = 22;
    }
    if (this.sliding) {
      this.slideTimer--;
      this.vx *= 0.93;
      if (this.slideTimer <= 0) { this.sliding = false; }
    }
    if (!ball.active && !this.hasBall) this.hasBall = true;

    this.vy += GRAVITY;
    this.x  += this.vx;
    this.y  += this.vy;

    this.onGround = false;
    for (const p of platformList) {
      if (this.x + this.w - 4 > p.x && this.x + 4 < p.x + p.w &&
          this.y + this.h > p.y && this.y + this.h < p.y + p.h + 18 && this.vy >= 0) {
        this.y = p.y - this.h; this.vy = 0; this.onGround = true;
      }
      if (this.y + this.h > p.y + 6 && this.y < p.y + p.h - 6) {
        if (this.x + this.w > p.x && this.x + this.w < p.x + 22 && this.vx > 0) {
          this.x = p.x - this.w; this.vx = 0;
        }
        if (this.x < p.x + p.w && this.x > p.x + p.w - 22 && this.vx < 0) {
          this.x = p.x + p.w; this.vx = 0;
        }
      }
    }
    if (!this.onGround && prevGround) this.coyote = 9;
    if (this.coyote > 0) this.coyote--;
    if (this.y > 900) { this.die(); }
    if (this.x < 0) { this.x = 0; this.vx = 0; }

    this.fTimer++;
    if (moving && this.onGround && this.fTimer >= 7) {
      this.frame = (this.frame + 1) % 4; this.fTimer = 0;
    } else if (!moving || !this.onGround) { this.frame = 0; this.fTimer = 0; }
    if (this.kickCD   > 0) this.kickCD--;
    if (this.kickTimer > 0) this.kickTimer--;
  }

  draw(camX) {
    if (this.dead) {
      const sx = this.x - camX;
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.deadTimer / 90);
      ctx.translate(sx + this.w/2, this.y + this.h/2);
      ctx.rotate((90 - this.deadTimer) * 0.14);
      ctx.translate(-this.w/2, -this.h/2);
      this._drawMessi();
      ctx.restore();
      return;
    }
    // blink during invincibility
    if (this.invincible > 0 && Math.floor(this.invincible / 6) % 2 === 0) return;
    const sx = this.x - camX;
    if (this.sliding) {
      ctx.save();
      // dust cloud behind the slide
      ctx.globalAlpha = 0.40 * (this.slideTimer / 30);
      ctx.fillStyle = '#C8B090';
      ctx.beginPath();
      ctx.ellipse(sx + (this.facing ? -14 : this.w + 14), this.y + this.h - 6, 28, 9, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // squish Messi into a horizontal sliding pose
      ctx.translate(sx + this.w/2, this.y + this.h * 0.72);
      ctx.scale(this.facing ? 1 : -1, 1);
      ctx.save();
      ctx.scale(1.15, 0.44);
      ctx.translate(-this.w/2, -this.h * 0.72);
      this._drawMessi();
      ctx.restore();
      ctx.restore();
      return;
    }
    ctx.save();
    ctx.translate(sx + (this.facing ? 0 : this.w), this.y);
    ctx.scale(this.facing ? 1 : -1, 1);
    this._drawMessi();
    ctx.restore();
  }

  _drawMessi() {
    const w = this.w, h = this.h, cx = w / 2;
    const swing = Math.sin(this.frame * Math.PI / 2) * 0.42;
    const kick  = this.kickTimer > 0 ? Math.sin((20 - this.kickTimer) / 20 * Math.PI) * 1.05 : 0;
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(cx, h+2, 18, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.save(); ctx.translate(cx-9, h-26); ctx.rotate(swing - kick*0.3);
    ctx.fillStyle = '#1a1a2a'; ctx.fillRect(-6, 0, 12, 12);
    ctx.fillStyle = '#C8996A'; ctx.fillRect(-5, 12, 10, 14);
    ctx.fillStyle = '#111'; ctx.fillRect(-7, 24, 14, 8);
    ctx.fillStyle = '#333'; ctx.fillRect(-7, 24, 14, 3); ctx.restore();
    ctx.save(); ctx.translate(cx+9, h-26); ctx.rotate(-swing + kick);
    ctx.fillStyle = '#1a1a2a'; ctx.fillRect(-6, 0, 12, 12);
    ctx.fillStyle = '#C8996A'; ctx.fillRect(-5, 12, 10, 14);
    ctx.fillStyle = '#111'; ctx.fillRect(-7, 24, 14, 8);
    ctx.fillStyle = '#333'; ctx.fillRect(-7, 24, 14, 3); ctx.restore();
    const stripes = ['#74AADB','#fff','#74AADB','#fff','#74AADB'];
    const sw = (w - 8) / stripes.length;
    stripes.forEach((c, i) => { ctx.fillStyle = c; ctx.fillRect(4 + i*sw, 20, sw+1, h-42); });
    ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
    ctx.strokeRect(4, 20, w-8, h-42);
    ctx.save(); ctx.translate(4, 25); ctx.rotate(-swing*0.5 + kick*0.3);
    ctx.fillStyle = '#74AADB'; ctx.fillRect(-9, 0, 10, 16);
    ctx.fillStyle = '#C8996A'; ctx.fillRect(-8, 14, 9, 11); ctx.restore();
    ctx.save(); ctx.translate(w-4, 25); ctx.rotate(swing*0.5 - kick*0.5);
    ctx.fillStyle = '#74AADB'; ctx.fillRect(0, 0, 9, 16);
    ctx.fillStyle = '#C8996A'; ctx.fillRect(0, 14, 8, 11); ctx.restore();
    ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center';
    ctx.strokeText('10', cx, h-27); ctx.fillText('10', cx, h-27);
    ctx.fillStyle = '#C8996A';
    ctx.beginPath(); ctx.arc(cx, 13, 15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#28180A';
    ctx.beginPath(); ctx.arc(cx, 6, 15, Math.PI*0.87, Math.PI*0.13, true); ctx.fill();
    ctx.fillRect(cx-15, 5, 7, 10); ctx.fillRect(cx+8, 5, 7, 10);
    ctx.beginPath(); ctx.arc(cx-1, 2, 6.5, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#160800';
    ctx.beginPath(); ctx.arc(cx-5, 13, 2.5, 0, Math.PI*2); ctx.arc(cx+5, 13, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx-3.8, 12, 0.9, 0, Math.PI*2); ctx.arc(cx+6.2, 12, 0.9, 0, Math.PI*2); ctx.fill();
    // nose — drawn before beard so it sits clearly above it
    ctx.strokeStyle = '#7A3A10'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(cx, 15, 3.2, 0.3, Math.PI-0.3); ctx.stroke();

function drawBg(camX, t, theme) {
  const sky = ctx.createLinearGradient(0, 0, 0, H);

    sky.addColorStop(0.52, '#CC3818'); sky.addColorStop(0.78, '#E86810'); sky.addColorStop(1, '#F0AE28');

function _bgBombonera(camX, t) {

    ctx.fillStyle = i%2===0 ? '#F5B800' : '#1A3A8C'; ctx.fillRect(bx, 570+bob, 28, 38);
    ctx.fillStyle = i%2===0 ? '#1A3A8C' : '#F5B800'; ctx.fillRect(bx, 570+bob+12, 28, 14);

  // Stadium floodlights (4 towers)

  hazeG.addColorStop(0, 'transparent');
  hazeG.addColorStop(1, 'rgba(30,50,100,0.28)');
  ctx.fillStyle = hazeG; ctx.fillRect(0, 400, W, H - 400);

  // Neon signs on buildings
  const neonSigns = [
    {tx: 0.05, ty: 0.54, col: '#FF2266', label: 'PIZZA'},
    {tx: 0.22, ty: 0.50, col: '#22DDFF', label: 'HOTEL'},
    {tx: 0.44, ty: 0.56, col: '#FFB800', label: 'BAR'},
    {tx: 0.63, ty: 0.52, col: '#AA44FF', label: 'CINE'},
    {tx: 0.82, ty: 0.55, col: '#FF5500', label: 'TAXI'},
  ];
  const p2b = camX * 0.115;
  for (const ns of neonSigns) {
    const nx = ((ns.tx * W + 1200 - p2b) % (W + 400) + W + 400) % (W + 400) - 200;
    if (nx < -80 || nx > W + 80) continue;
    const ny = ns.ty * H;
    const flicker = Math.sin(t/9 + nx) > -0.85 ? 1 : 0.3;
    ctx.save(); ctx.globalAlpha = flicker * (0.72 + Math.sin(t/28+nx)*0.16);
    ctx.shadowBlur = 18; ctx.shadowColor = ns.col;
    ctx.fillStyle = ns.col; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
    ctx.fillText(ns.label, nx, ny);
    ctx.restore();
  }

  // Avenida 9 de Julio (world's widest avenue) — wet road with reflections
  const p3 = camX * 0.21;
  const roadG = ctx.createLinearGradient(0, 592, 0, 620);
  roadG.addColorStop(0, '#0E1118'); roadG.addColorStop(1, '#14182A');
  ctx.fillStyle = roadG; ctx.fillRect(0, 592, W, 28);
  // Wet road reflections (puddles of lamplight and neon)
  for (let i = 0; i < 8; i++) {
    const rx = ((i*185+40-p3*0.6) % (W+60)+W+60) % (W+60) - 30;
    ctx.save(); ctx.globalAlpha = 0.18+Math.sin(t/18+i)*0.08;
    const refG = ctx.createLinearGradient(rx, 600, rx+80, 600);
    refG.addColorStop(0, 'rgba(255,220,100,0)'); refG.addColorStop(0.5, 'rgba(255,220,100,0.5)'); refG.addColorStop(1, 'rgba(255,220,100,0)');
    ctx.fillStyle = refG; ctx.fillRect(rx, 600, 80, 10);
    ctx.restore();
  }
  ctx.strokeStyle = 'rgba(255,255,150,0.22)'; ctx.lineWidth = 1.4; ctx.setLineDash([22,14]);
  for (let lane = 0; lane < 5; lane++) {
    ctx.beginPath(); ctx.moveTo(-p3%36, 597+lane*5.2); ctx.lineTo(W-p3%36, 597+lane*5.2); ctx.stroke();
  }
  ctx.setLineDash([]);

  // Moving cars (headlights + taillights)
  const pCar = camX * 0.40;
  for (let i = 0; i < 6; i++) {
    const carX = ((i*340 + 80 - pCar) % (W+220)+W+220) % (W+220) - 110;
    const carY = 597 + (i%2)*8;
    const rightMoving = i%2===0;
    ctx.save();
    ctx.fillStyle = '#1A1A2A'; ctx.fillRect(carX, carY, 60, 11);
    if (rightMoving) {
      // White headlights front
      ctx.globalAlpha = 0.65;
      const hl = ctx.createRadialGradient(carX+56, carY+5, 0, carX+56, carY+5, 40);
      hl.addColorStop(0, 'rgba(255,255,220,0.6)'); hl.addColorStop(1, 'transparent');
      ctx.fillStyle = hl; ctx.beginPath(); ctx.arc(carX+56, carY+5, 40, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFFFF0'; ctx.fillRect(carX+50, carY+2, 8, 7);
    } else {
      // Red taillights back
      ctx.globalAlpha = 0.55;
      const tl = ctx.createRadialGradient(carX+4, carY+5, 0, carX+4, carY+5, 30);
      tl.addColorStop(0, 'rgba(255,60,30,0.55)'); tl.addColorStop(1, 'transparent');
      ctx.fillStyle = tl; ctx.beginPath(); ctx.arc(carX+4, carY+5, 30, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FF4422'; ctx.fillRect(carX+2, carY+2, 8, 7);
    }
    ctx.restore();
  }

  // Street lights — brighter with larger rain halos
  for (let i = 0; i < 18; i++) {
    const lx = ((i*175-camX*0.27) % (W+100)+W+100) % (W+100) - 50;
    if (lx < -22 || lx > W+22) continue;
    const pulse = 0.90+Math.sin(t/38+i)*0.07;
    ctx.save(); ctx.globalAlpha = pulse;
    ctx.fillStyle = '#1E1C2A'; ctx.fillRect(lx-2, 530, 4, 64); ctx.fillRect(lx-14, 530, 28, 5);
    // Rain halo around lamp
    const glG = ctx.createRadialGradient(lx, 533, 0, lx, 533, 72);
    glG.addColorStop(0, 'rgba(255,215,90,0.32)'); glG.addColorStop(0.6, 'rgba(255,215,90,0.06)'); glG.addColorStop(1, 'transparent');
    ctx.fillStyle = glG; ctx.beginPath(); ctx.arc(lx, 533, 72, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 14; ctx.shadowColor = '#FFEE88';
    ctx.fillStyle = '#FFF5AA'; ctx.fillRect(lx-12, 530, 24, 5);
    ctx.restore();
  }

  // Crowd — night crowd, umbrellas, phone screens
  const p4 = camX * 0.60;
  for (let i = 0; i < 95; i++) {
    const cx3 = ((i*34-p4) % 4800+4800) % 4800;
    if (cx3 < -40 || cx3 > W+40) continue;
    const bob = Math.sin(t/17+i*0.85)*3;
    ctx.fillStyle = `rgba(${22+i%35},${22+i%28},${50+i%44},0.80)`;
    ctx.beginPath(); ctx.arc(cx3, 612+bob, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(cx3-4, 617+bob, 9, 12);
    // Umbrellas
    if (i%3===0) {
      ctx.save(); ctx.globalAlpha = 0.50;
      const umbCol = ['#74AADB','#FF4466','#FFD700','#44AAFF','#AA88FF'][i%5];
      ctx.fillStyle = umbCol;
      ctx.beginPath(); ctx.arc(cx3, 608+bob, 8, Math.PI, 0); ctx.fill();
      ctx.strokeStyle = '#555'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(cx3, 608+bob); ctx.lineTo(cx3, 618+bob); ctx.stroke();
      ctx.restore();
    }
    // Phone screens
    if (i%5===0) {
      ctx.save(); ctx.globalAlpha = 0.50+Math.sin(t/28+i)*0.22;
      ctx.fillStyle = '#88BBFF'; ctx.fillRect(cx3-3, 608+bob, 6, 5); ctx.restore();
    }
  }
}

function _tangoSilhouette(x, y, t) {
  // Two separate standing figures facing each other in a classic tango pose
  ctx.fillStyle = 'rgba(12,4,28,0.72)';
  const sway = Math.sin(t * 0.32) * 0.06;
  const step = Math.sin(t * 0.5) * 0.18;

  // ── Lead (left figure) ──────────────────────────────────────────────
  ctx.save(); ctx.translate(x - 2, y);
  // Head
  ctx.beginPath(); ctx.arc(0, -54, 6, 0, Math.PI*2); ctx.fill();
  // Torso
  ctx.fillRect(-4, -48, 9, 22);
  // Right arm extended toward partner (frame arm)
  ctx.save(); ctx.translate(5, -42); ctx.rotate(-0.3 + sway);
  ctx.fillRect(0, -2, 19, 4); ctx.restore();
  // Left arm raised (free arm)
  ctx.save(); ctx.translate(-4, -44); ctx.rotate(-1.1 - sway * 0.5);
  ctx.fillRect(-16, -2, 16, 4); ctx.restore();
  // Legs (slightly stepped)
  ctx.save(); ctx.translate(-3, -26); ctx.rotate(-step * 0.15);
  ctx.fillRect(-3, 0, 6, 26); ctx.restore();
  ctx.save(); ctx.translate(3, -26); ctx.rotate(step * 0.2);
  ctx.fillRect(-3, 0, 6, 26); ctx.restore();
  ctx.restore();

  // ── Follow (right figure, woman with skirt) ──────────────────────────
  ctx.save(); ctx.translate(x + 30, y);
  // Head
  ctx.beginPath(); ctx.arc(0, -54, 6, 0, Math.PI*2); ctx.fill();
  // Torso
  ctx.fillRect(-4, -48, 9, 20);
  // Skirt (A-line flare from waist down)
  ctx.beginPath();
  ctx.moveTo(-5, -28); ctx.lineTo(-13, 0); ctx.lineTo(13, 0); ctx.lineTo(5, -28);
  ctx.closePath(); ctx.fill();
  // Left arm extended toward partner
  ctx.save(); ctx.translate(-5, -42); ctx.rotate(0.3 - sway);
  ctx.fillRect(-19, -2, 19, 4); ctx.restore();
  // Right arm raised (free arm, elegant)
  ctx.save(); ctx.translate(4, -44); ctx.rotate(1.2 + sway * 0.5);
  ctx.fillRect(0, -2, 15, 4); ctx.restore();
  // Legs
  ctx.save(); ctx.translate(-3, -28); ctx.rotate(step * 0.15);
  ctx.fillRect(-3, 0, 6, 28); ctx.restore();
  ctx.save(); ctx.translate(3, -28); ctx.rotate(-step * 0.18);
  ctx.fillRect(-3, 0, 6, 28); ctx.restore();
  ctx.restore();
}

function drawPlatforms(camX, platformList) {
  for (const p of platformList) {
    const sx = p.x - camX;
    if (sx + p.w < -10 || sx > W + 10) continue;
    const isGround = p.h > 50;
    if (isGround) {
      const gg = ctx.createLinearGradient(sx, p.y, sx, p.y+p.h);
      gg.addColorStop(0, '#58C34A'); gg.addColorStop(0.1, '#48A03A');
      gg.addColorStop(0.4, '#3B7A2C'); gg.addColorStop(1, '#265018');
      ctx.fillStyle = gg; ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.fillStyle = '#78D860'; ctx.fillRect(sx, p.y, p.w, 6);
      for (let gx = sx+8; gx < sx+p.w-8; gx += 14) {
        const gh = 3 + Math.sin(gx * 0.4) * 2;
        ctx.fillStyle = '#8DE068'; ctx.fillRect(gx, p.y-gh+2, 3, gh);
        ctx.fillRect(gx+5, p.y-gh+1, 2, gh+1);
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 2;
      ctx.setLineDash([12, 18]);
      ctx.beginPath(); ctx.moveTo(sx, p.y+38); ctx.lineTo(sx+p.w, p.y+38); ctx.stroke();
      ctx.setLineDash([]);
    } else if (p.w < 65) {
      // Canyon stepping stone — rocky/jagged ledge
      const rg = ctx.createLinearGradient(sx, p.y, sx, p.y+p.h);
      rg.addColorStop(0, '#A09080'); rg.addColorStop(0.5, '#786050'); rg.addColorStop(1, '#504038');
      ctx.fillStyle = rg; roundRect(sx, p.y, p.w, p.h, 3); ctx.fill();
      // Crack lines
      ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(sx+p.w*0.3, p.y+2); ctx.lineTo(sx+p.w*0.35, p.y+p.h-2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx+p.w*0.65, p.y+3); ctx.lineTo(sx+p.w*0.62, p.y+p.h-2); ctx.stroke();
      // Top highlight
      ctx.fillStyle = '#BEB0A0'; ctx.fillRect(sx+1, p.y, p.w-2, 4);
      // Glow beneath (floating rock feel)
      ctx.save(); ctx.globalAlpha = 0.18;
      ctx.fillStyle = '#FF8800';
      ctx.beginPath(); ctx.ellipse(sx+p.w/2, p.y+p.h+5, p.w*0.4, 6, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    } else {
      const pg = ctx.createLinearGradient(sx, p.y, sx, p.y+p.h);
      pg.addColorStop(0, '#78D460'); pg.addColorStop(0.35, '#56A83E'); pg.addColorStop(1, '#3A7028');
      ctx.fillStyle = pg; roundRect(sx, p.y, p.w, p.h, 5); ctx.fill();
      ctx.fillStyle = '#8DE668'; ctx.fillRect(sx+1, p.y, p.w-2, 5);
      ctx.fillStyle = '#8B6010'; ctx.fillRect(sx, p.y+6, p.w, p.h-9);
      ctx.fillStyle = '#A07820'; ctx.fillRect(sx+2, p.y+8, p.w-4, 3);
      ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fillRect(sx, p.y+p.h-3, p.w, 3);
    }
  }
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD(score, player, ball, cat, levelIdx, boss, goalScored) {
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, 56);

  // Score
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 26px Arial'; ctx.textAlign = 'left';
  ctx.fillText(`⚽  ${score}`, 18, 36);

  // Level name
  ctx.fillStyle = '#74AADB'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${levelIdx + 1}  —  ${LEVELS[levelIdx].name}`, W/2, 22);

  // Status
  ctx.font = '15px Arial';
  if (boss && boss.alive) {
    if (boss.type === 'stun-boss') {
      if (boss.confused) {
        ctx.fillStyle = '#44CCFF';
        ctx.fillText(`😵 BOSS STUNNED! Kick the ball! HP: ${boss.hp}/${boss.maxHp}`, W/2, 42);
      } else {
        ctx.fillStyle = '#CC88FF';
        ctx.fillText(`🐱 Press Z — send the cat to stun the boss first!  HP: ${boss.hp}/${boss.maxHp}`, W/2, 42);
      }
    } else if (boss.type === 'keeper-boss') {
      ctx.fillStyle = '#44DD88';
      ctx.fillText(`🧤 GOALKEEPER! Kick past the keeper — ${boss.hp} goal${boss.hp!==1?'s':''} to win!`, W/2, 42);
    } else {
      ctx.fillStyle = '#FF6644';
      ctx.fillText(`⚔  Defeat the Boss!   HP: ${boss.hp} / ${boss.maxHp}`, W/2, 42);
    }
  } else if (!goalScored) {
    const pulse = Math.sin(Date.now()/300) * 0.4 + 0.6;
    ctx.save(); ctx.globalAlpha = pulse; ctx.fillStyle = '#44FFaa';
    ctx.fillText('Boss defeated!  Kick the ball into the net! ⚽', W/2, 42);
    ctx.restore();
  } else {
    ctx.fillStyle = '#FFD700';
    ctx.fillText('GOAL!  Level Complete!', W/2, 42);
  }

  // Lives (right side)
  ctx.textAlign = 'right';
  ctx.font = 'bold 22px Arial';
  let livesStr = '';
  for (let i = 0; i < 3; i++) livesStr += i < player.lives ? '❤' : '🖤';
  ctx.fillStyle = '#FF4444';
  ctx.fillText(livesStr, W - 14, 36);

  // Ball hint (right side)
  ctx.font = '13px Arial';
  if (ball.returning) {
    ctx.fillStyle = '#66AAFF'; ctx.fillText('↩ Ball returning…', W-14, 52);
  } else if (player.hasBall) {
    ctx.fillStyle = '#55EE88'; ctx.fillText('X / Z / Shift = KICK!', W-14, 52);
  }

  // Cat status (left side)
  if (cat) {
    ctx.textAlign = 'left'; ctx.font = 'bold 14px Arial';
    if (cat.mode === 'attack') {
      ctx.fillStyle = '#AADDFF'; ctx.fillText('🐱 Cat: POUNCING!', 18, 52);
    } else if (cat.mode === 'return') {
      ctx.fillStyle = '#AACCDD'; ctx.fillText('🐱 Cat: returning…', 18, 52);
    } else if (cat.attackCD > 0) {
      ctx.fillStyle = '#FF9988'; ctx.fillText('🐱 Cat: recharging…', 18, 52);
    } else {
      ctx.fillStyle = '#AADDFF'; ctx.fillText('🐱  Z = cat pounce!', 18, 52);
    }
  }

  // Controls box
  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  roundRect(W-250, H-126, 244, 120, 8); ctx.fill();
  ctx.fillStyle = '#CCC'; ctx.font = '13px Arial'; ctx.textAlign = 'left';
  ctx.fillText('Move:   ← → or A D',           W-238, H-88);
  ctx.fillText('Jump:   ↑ or W or Space',      W-238, H-69);
  ctx.fillText('Kick:    X / Z / Shift',        W-238, H-50);
  ctx.fillText('Slide:   ↓ or S + Kick',        W-238, H-31);
  ctx.fillText('Cat pounce:  Z',                W-238, H-12);
  ctx.fillStyle = '#888';
  ctx.fillText('Touch enemies = lose a life!', W-238, H-12);
}
